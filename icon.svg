<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="#0f172a"/>

  <!-- Radiating light rays (unconcealment) -->
  <g opacity="0.15">
    <line x1="256" y1="256" x2="256" y2="60" stroke="#e2e8f0" stroke-width="2"/>
    <line x1="256" y1="256" x2="394" y2="116" stroke="#e2e8f0" stroke-width="2"/>
    <line x1="256" y1="256" x2="452" y2="256" stroke="#e2e8f0" stroke-width="2"/>
    <line x1="256" y1="256" x2="394" y2="396" stroke="#e2e8f0" stroke-width="2"/>
    <line x1="256" y1="256" x2="256" y2="452" stroke="#e2e8f0" stroke-width="2"/>
    <line x1="256" y1="256" x2="118" y2="396" stroke="#e2e8f0" stroke-width="2"/>
    <line x1="256" y1="256" x2="60" y2="256" stroke="#e2e8f0" stroke-width="2"/>
    <line x1="256" y1="256" x2="118" y2="116" stroke="#e2e8f0" stroke-width="2"/>
  </g>

  <!-- Outer glow ring -->
  <circle cx="256" cy="236" r="130" stroke="#334155" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Eye shape (perception / research) -->
  <path d="M96 236 C96 236 176 136 256 136 C336 136 416 236 416 236 C416 236 336 336 256 336 C176 336 96 236 96 236Z" fill="#1e293b" stroke="#475569" stroke-width="2"/>

  <!-- Iris -->
  <circle cx="256" cy="236" r="70" fill="#1e3a5f"/>
  <circle cx="256" cy="236" r="70" fill="url(#irisGradient)"/>

  <!-- Pupil -->
  <circle cx="256" cy="236" r="30" fill="#0f172a"/>

  <!-- Light reflection in eye -->
  <circle cx="242" cy="220" r="10" fill="#e2e8f0" opacity="0.6"/>
  <circle cx="268" cy="248" r="5" fill="#e2e8f0" opacity="0.3"/>

  <!-- Pen nib below the eye (writing / blogging) -->
  <g transform="translate(256, 410)">
    <!-- Nib body -->
    <path d="M0 -50 L-14 0 L0 20 L14 0 Z" fill="#94a3b8"/>
    <!-- Nib split -->
    <line x1="0" y1="-30" x2="0" y2="20" stroke="#0f172a" stroke-width="1.5"/>
    <!-- Nib tip highlight -->
    <path d="M-4 10 L0 20 L4 10" fill="#e2e8f0"/>
  </g>

  <!-- Greek alpha (α) faintly in the pupil — aletheia -->
  <text x="256" y="244" text-anchor="middle" font-family="serif" font-size="28" fill="#334155" opacity="0.5">α</text>

  <defs>
    <radialGradient id="irisGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#1e40af" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0.8"/>
    </radialGradient>
  </defs>
</svg>
